<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Script Hub</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #1e1f22;
  color: white;
  overflow: hidden;
}

.sidebar {
  width: 220px;
  height: 100vh;
  background: #2b2d31;
  position: fixed;
  padding: 20px;
}

.sidebar h2 {
  margin-bottom: 20px;
}

.sidebar button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  background: #5865f2;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 6px;
}

.main {
  margin-left: 240px;
  padding: 20px;
  height: 100vh;
  overflow-y: auto;
}

.card {
  background: #313338;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

.script-box {
  width: 100%;
  height: 120px;
  background: #1e1f22;
  color: #00ff9c;
  border: none;
  padding: 10px;
  border-radius: 6px;
}

.hidden {
  display: none;
}

.canvas-bg {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

.link-btn {
  background: #23a559;
  text-decoration: none;
  padding: 10px;
  display: inline-block;
  border-radius: 6px;
  color: white;
}

</style>
</head>
<body>

<canvas class="canvas-bg" id="bg"></canvas>

<div class="sidebar">
  <h2>Dashboard</h2>
  <button onclick="showTab('dashboard')">Dashboard</button>
  <button onclick="showTab('roblox')">Roblox Scripts</button>
  <button onclick="showTab('minecraft')">Minecraft Server</button>
</div>

<div class="main">

<div id="dashboard" class="tab">
  <div class="card">
    <h3>📢 Announcement</h3>
    <p>Website Made</p>
  </div>

  <div class="card" style="max-height:200px; overflow-y:auto;">
    <h3>Updates</h3>
    <p>- Added Roblox Scripts tab</p>
    <p>- Added Minecraft Server tab</p>
  </div>
</div>

<div id="roblox" class="tab hidden">
  <div class="card">
    <button onclick="showScript('lucky')">Be a Lucky Block</button>
    <button onclick="showScript('draw')">Draw & Slide</button>
    <br><br>
    <a class="link-btn" href="https://discord.gg/Gx3UPpzq3M" target="_blank">Join Discord</a>
  </div>

  <div id="scriptDisplay" class="card hidden">
    <textarea class="script-box" id="scriptBox" readonly></textarea>
  </div>
</div>

<div id="minecraft" class="tab hidden">
  <div class="card">
    <h3>Minecraft Server</h3>
    <p>Coming soon...</p>
  </div>
</div>

</div>

<script>
function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
  document.getElementById(tab).classList.remove('hidden');
}

function showScript(type) {
  const box = document.getElementById('scriptBox');
  const display = document.getElementById('scriptDisplay');

  if(type === 'lucky') {
    box.value = 'loadstring(game:HttpGet("https://pastefy.app/6uORVYTL/raw"))()';
  } else {
    box.value = 'loadstring(game:HttpGet("https://pastefy.app/MH87a5xd/raw"))()';
  }

  display.classList.remove('hidden');
}

const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let ripples = [];

document.addEventListener('mousemove', e => {
  ripples.push({x: e.clientX, y: e.clientY, radius: 0});
});

function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ripples.forEach((r, i) => {
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.radius, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(88,101,242,0.3)';
    ctx.stroke();

    r.radius += 2;

    if(r.radius > 100) ripples.splice(i,1);
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
