<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MTNDEW Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0d12;
  --panel:#121827;
  --panel2:#0f1422;
  --blue:#4ea1ff;
  --blue2:#2f7dff;
  --text:#eaf1ff;
  --green:#21c46a;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:radial-gradient(circle at top,#101a2d,#070a10);
  color:var(--text);
  overflow:hidden;
}
.sidebar{
  position:fixed;
  width:250px;
  height:100vh;
  padding:20px;
  background:linear-gradient(180deg,var(--panel),var(--panel2));
}
.logo{
  font-size:20px;
  font-weight:800;
  margin-bottom:25px;
}
.nav{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:14px;
  border:1px solid rgba(78,161,255,0.2);
  background:rgba(18,24,39,0.6);
  color:var(--text);
  cursor:pointer;
  transition:.25s;
}
.nav:hover{
  transform:translateX(6px);
  border-color:rgba(78,161,255,0.6);
  box-shadow:0 0 18px rgba(78,161,255,0.2);
}
.active{
  background:linear-gradient(90deg,var(--blue),var(--blue2));
  box-shadow:0 0 25px rgba(78,161,255,0.35);
}
.main{
  margin-left:270px;
  padding:25px;
  height:100vh;
}
.title{
  font-size:26px;
  font-weight:800;
  margin-bottom:20px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:18px;
}
.card{
  background:rgba(18,24,39,0.75);
  border:1px solid rgba(78,161,255,0.18);
  border-radius:22px;
  padding:16px;
  backdrop-filter:blur(10px);
  box-shadow:0 10px 30px rgba(0,0,0,0.35);
}
.card:hover{
  transform:translateY(-6px);
  box-shadow:0 0 30px rgba(78,161,255,0.25);
}
.btn{
  width:100%;
  padding:11px;
  border:none;
  border-radius:16px;
  background:linear-gradient(90deg,var(--blue),var(--blue2));
  color:white;
  cursor:pointer;
  font-weight:600;
}
.btn:hover{
  filter:brightness(1.1);
}
.box{
  width:100%;
  height:120px;
  margin-top:10px;
  border-radius:16px;
  border:1px solid rgba(78,161,255,0.2);
  background:#0b0f1a;
  color:#7dffb2;
  padding:10px;
  font-family:monospace;
}
.link{
  display:inline-block;
  margin-top:10px;
  padding:10px 14px;
  border-radius:16px;
  background:var(--green);
  color:white;
  text-decoration:none;
}
.tab{
  display:none;
  animation:fade .35s ease;
}
.activeTab{
  display:block;
}
@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="sidebar">
<div class="logo">MTNDEW HUB</div>
<button class="nav active" onclick="openTab('dash',this)">Dashboard</button>
<button class="nav" onclick="openTab('rbx',this)">Roblox</button>
<button class="nav" onclick="openTab('mc',this)">Minecraft</button>
</div>
<div class="main">
<div id="dash" class="tab activeTab">
<div class="title">Dashboard</div>
<div class="grid">
<div class="card">Announcement<br>Website Made</div>
<div class="card">Updates<br>- UI upgraded<br>- Better effects<br>- Smooth waves</div>
</div>
</div>
<div id="rbx" class="tab">
<div class="title">Roblox Scripts</div>
<div class="grid">
<div class="card">
Be a Lucky Block
<button class="btn" onclick="setScript(1)">Load</button>
</div>
<div class="card">
Draw & Slide
<button class="btn" onclick="setScript(2)">Load</button>
</div>
<div class="card">
Discord
<a class="link" href="https://discord.gg/Gx3UPpzq3M">Join</a>
</div>
</div>
<div class="card">
Script
<textarea id="out" class="box" readonly></textarea>
</div>
</div>
<div id="mc" class="tab">
<div class="title">Minecraft Server</div>
<div class="card">
hilltopsmp.minekeep.gg
<button class="btn" onclick="copy()">Click to Copy</button>
</div>
</div>
</div>
<script>
function openTab(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('activeTab'));
  document.getElementById(id).classList.add('activeTab');
  document.querySelectorAll('.nav').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}
function setScript(i){
  const o=document.getElementById('out');
  o.value=i===1?'loadstring(game:HttpGet("https://pastefy.app/6uORVYTL/raw"))()':'loadstring(game:HttpGet("https://pastefy.app/MH87a5xd/raw"))()';
}
function copy(){
  navigator.clipboard.writeText('hilltopsmp.minekeep.gg');
}
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=innerWidth;
canvas.height=innerHeight;
let rip=[];
document.addEventListener('mousemove',e=>{
  rip.push({x:e.clientX,y:e.clientY,r:0,a:1});
});
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  rip.forEach((p,i)=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.strokeStyle='rgba(78,161,255,'+p.a+')';
    ctx.lineWidth=2;
    ctx.stroke();
    p.r+=1.8;
    p.a-=0.015;
    if(p.a<=0)rip.splice(i,1);
  });
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
