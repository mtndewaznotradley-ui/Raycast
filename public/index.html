<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raycast Dashboard</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --accent: #555555;
            --border: #eeeeee;
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: var(--text);
            margin: 0;
        }

        .container {
            max-width: 500px;
            width: 90%;
            margin-top: 60px;
            text-align: center;
        }

        #login-screen {
            padding: 40px;
        }

        h2 {
            font-weight: 300;
            letter-spacing: -0.5px;
            margin-bottom: 30px;
        }

        #dashboard {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .profile-card {
            background: #fafafa;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }

        #display-pfp {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 2px solid var(--border);
        }

        #display-name {
            font-size: 1.5rem;
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }

        .edit-panel {
            text-align: left;
            margin-top: 40px;
        }

        label {
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--accent);
            display: block;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }

        input:focus {
            border-color: #000;
        }

        .btn-update {
            width: 100%;
            padding: 12px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-update:hover {
            opacity: 0.8;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .g-center {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <header>
        <h1 class="logo">Raycast</h1>
    </header>

    <div class="container">
        <div id="login-screen">
            <h2>Please Log In</h2>
            
            <div id="g_id_onload"
                 data-client_id="609524851944-vpok2chtgp9v08nnr67qcqgfjk431tkv.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>

            <div class="g-center">
                <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
            </div>
        </div>

        <div id="dashboard">
            <div class="profile-card">
                <img id="display-pfp" src="" alt="Profile">
                <span id="display-name">User</span>
                <p style="color: var(--accent); font-size: 0.9rem;">Welcome back to your dashboard.</p>
            </div>

            <div class="edit-panel">
                <label>Change Username</label>
                <input type="text" id="input-username" placeholder="New name...">
                
                <label>Change Profile Picture (URL)</label>
                <input type="text" id="input-pfp" placeholder="Image URL...">
                
                <button class="btn-update" onclick="updateProfile()">Update Profile</button>
            </div>
        </div>
    </div>

    <script>
        function handleCredentialResponse(response) {
            const payload = parseJwt(response.credential);
            document.getElementById('display-name').innerText = payload.name;
            document.getElementById('display-pfp').src = payload.picture;
            document.getElementById('input-username').value = payload.name;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        }

        function updateProfile() {
            const newName = document.getElementById('input-username').value;
            const newPfp = document.getElementById('input-pfp').value;

            if (newName.trim() !== "") {
                document.getElementById('display-name').innerText = newName;
            }
            if (newPfp.trim() !== "") {
                document.getElementById('display-pfp').src = newPfp;
            }
        }

        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }
    </script>
</body>

</html>
