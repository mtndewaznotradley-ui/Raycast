<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Dashboard</title>
    <style>
        :root {
            --primary: #00d2ff;
            --accent: #3a7bd5;
            --bg: #0b0b0d;
            --card-bg: rgba(255, 255, 255, 0.05);
            --discord: #5865F2;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: white;
            overflow-x: hidden;
        }

        .ocean {
            height: 5%;
            width: 100%;
            position: fixed;
            bottom: 0;
            left: 0;
            background: transparent;
            z-index: -1;
        }

        .wave {
            background: url(https://s3-us-west-2.amazonaws.com/s.cdpn.io/85486/wave.svg) repeat-x;
            position: absolute;
            top: -198px;
            width: 6400px;
            height: 198px;
            animation: wave 7s cubic-bezier(0.36, 0.45, 0.63, 0.53) infinite;
            transform: translate3d(0, 0, 0);
            opacity: 0.3;
        }

        .wave:nth-of-type(2) {
            top: -175px;
            animation: wave 7s cubic-bezier(0.36, 0.45, 0.63, 0.53) -0.125s infinite, swell 7s ease -0.125s infinite;
            opacity: 0.1;
        }

        @keyframes wave {
            0% { margin-left: 0; }
            100% { margin-left: -1600px; }
        }

        @keyframes swell {
            0%, 100% { transform: translate3d(0, -25px, 0); }
            50% { transform: translate3d(0, 5px, 0); }
        }

        nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 10px 5px;
            position: sticky;
            top: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        .tab-link {
            background: none;
            border: none;
            color: #888;
            padding: 10px 15px;
            margin: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 8px;
        }

        .tab-link:hover,
        .tab-link.active {
            color: var(--primary);
            background: rgba(0, 210, 255, 0.1);
        }

        .tab-content {
            display: none;
            padding: 60px 20px;
            text-align: center;
            min-height: 80vh;
        }

        .tab-content.active {
            display: block;
            animation: fadeInUp 0.4s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .app-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            margin: 20px auto;
            transition: 0.3s;
        }

        .app-card:hover {
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .avatar-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            margin-bottom: 20px;
            object-fit: cover;
        }

        .app-card .avatar-img {
            border-radius: 25px;
        }

        .download-btn {
            background: var(--primary);
            color: black;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 15px;
        }

        .progress-container {
            display: none;
            width: 100%;
            background: #222;
            border-radius: 20px;
            margin-top: 20px;
            overflow: hidden;
            height: 20px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.1s linear;
        }

        .status-text {
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--primary);
        }

        h2 {
            color: var(--primary);
            margin-bottom: 5px;
            font-size: 1.5rem;
        }

        @media (max-width: 600px) {
            .tab-link { flex: 1 1 40%; padding: 10px; font-size: 0.9rem; }
        }
    </style>
</head>

<body>

    <div class="ocean">
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <nav>
        <button class="tab-link active" onclick="showTab(event, 'Dashboard')">Dashboard</button>
        <button class="tab-link" onclick="showTab(event, 'Minecraft')">Minecraft Server</button>
        <button class="tab-link" onclick="showTab(event, 'Apps')">Apps</button>
    </nav>

    <div id="Dashboard" class="tab-content active">
        <h1>Welcome, user</h1>
        <p>Your systems are running at 100% efficiency.</p>
    </div>

    <div id="Minecraft" class="tab-content">
        <h1>Minecraft Server</h1>
        <p>Server IP: <b>hilltopsmp.minekeep.gg</b></p>
        <p>Status: <span style="color: #4cd137;">Online</span></p>
    </div>

    <div id="Apps" class="tab-content">
        <h1>Apps</h1>
        <div class="app-card">
            <img src="https://github.com/mtndewaznotradley-ui/Raycast/raw/main/images/Discord%20bot.png" alt="Discord Bot Icon" class="avatar-img">
            <h2>Discord Bot</h2>
            <p>Raid a Server!</p>
            <button id="downloadBtn" class="download-btn" onclick="startDownload()">Download</button>
            <div id="progressContainer" class="progress-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <p id="statusText" class="status-text" style="display: none;">Downloading: 0%</p>
        </div>
    </div>

    <script>
        function showTab(evt, tabId, isInitial = false) {
            const contents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < contents.length; i++) contents[i].classList.remove("active");
            
            const links = document.getElementsByClassName("tab-link");
            for (let i = 0; i < links.length; i++) links[i].classList.remove("active");

            const activeTab = document.getElementById(tabId);
            if (activeTab) {
                activeTab.classList.add("active");
            }

            if (evt) {
                evt.currentTarget.classList.add("active");
            } else {
                Array.from(links).forEach(btn => {
                    if (btn.innerText.includes(tabId)) btn.classList.add("active");
                });
            }

            if (!isInitial) {
                const newUrl = window.location.origin + '/' + tabId;
                window.history.pushState({ path: newUrl }, '', newUrl);
            }
        }

        window.onload = () => {
            const path = window.location.pathname.replace('/', '');
            const validTabs = ['Dashboard', 'Minecraft', 'Apps'];
            if (validTabs.includes(path)) {
                showTab(null, path, true);
            }
        };

        window.onpopstate = () => {
            const path = window.location.pathname.replace('/', '');
            showTab(null, path || 'Dashboard', true);
        };

        function startDownload() {
            const btn = document.getElementById('downloadBtn');
            const container = document.getElementById('progressContainer');
            const bar = document.getElementById('progressBar');
            const status = document.getElementById('statusText');
            
            btn.style.display = 'none';
            container.style.display = 'block';
            status.style.display = 'block';

            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    status.innerText = "Complete! Opening...";
                    setTimeout(() => {
                        window.location.href = "https://github.com/mtndewaznotradley-ui/Raycast/raw/main/Apps/Raider.zip"; 
                    }, 1000);
                } else {
                    width++;
                    bar.style.width = width + '%';
                    status.innerText = "Downloading: " + width + "%";
                }
            }, 200);
        }
    </script>
</body>
</html>
