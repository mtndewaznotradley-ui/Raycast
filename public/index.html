<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL // Service Dashboard</title>
    <style>
        :root {
            --primary: #00ff41;
            --accent: #003b00;
            --bg: #050505;
            --card-bg: rgba(0, 255, 65, 0.05);
            --text-glow: 0 0 8px rgba(0, 255, 65, 0.8);
        }

        * {
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--primary);
            overflow-x: hidden;
            text-shadow: var(--text-glow);
        }

        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 200;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(0, 255, 65, 0.1) 0%, transparent 100%);
            z-index: -1;
            opacity: 0.15;
            animation: pulse 4s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.2; }
        }

        nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            background: rgba(0, 20, 0, 0.9);
            padding: 10px 5px;
            position: sticky;
            top: 0;
            border-bottom: 2px solid var(--primary);
            z-index: 100;
        }

        .tab-link {
            background: none;
            border: 1px solid transparent;
            color: var(--primary);
            padding: 10px 20px;
            margin: 5px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab-link:hover,
        .tab-link.active {
            background: var(--primary);
            color: black;
            box-shadow: 0 0 15px var(--primary);
        }

        .tab-content {
            display: none;
            padding: 60px 20px;
            text-align: left;
            max-width: 800px;
            margin: 0 auto;
            min-height: 80vh;
        }

        .tab-content.active {
            display: block;
            animation: glitch 0.3s ease;
        }

        @keyframes glitch {
            0% { transform: skew(5deg); opacity: 0; }
            50% { transform: skew(-5deg); opacity: 1; }
            100% { transform: skew(0); }
        }

        .app-card {
            background: var(--bg);
            border: 1px solid var(--primary);
            padding: 30px;
            width: 100%;
            max-width: 450px;
            margin: 20px 0;
            position: relative;
        }

        .app-card::after {
            content: "SECURED_ENV";
            position: absolute;
            top: -10px; right: 10px;
            background: var(--bg);
            font-size: 0.7rem;
            padding: 0 5px;
        }

        .avatar-img {
            width: 120px;
            filter: grayscale(1) sepia(1) hue-rotate(60deg) saturate(5);
            border: 1px solid var(--primary);
            margin-bottom: 20px;
        }

        .download-btn {
            background: none;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 12px 30px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .download-btn:hover {
            background: var(--primary);
            color: black;
        }

        .progress-container {
            display: none;
            width: 100%;
            border: 1px solid var(--primary);
            margin-top: 20px;
            height: 25px;
            background: #000;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--primary);
        }

        h1, h2 {
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2rem;
            background: var(--primary);
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>

<body>

    <div class="matrix-bg"></div>

    <nav>
        <button class="tab-link active" onclick="showTab(event, 'Dashboard')">[ DASHBOARD ]</button>
        <button class="tab-link" onclick="showTab(event, 'Minecraft')">[ SERVER_LOGS ]</button>
        <button class="tab-link" onclick="showTab(event, 'Apps')">[ EXPLOITS ]</button>
    </nav>

    <div id="Dashboard" class="tab-content active">
        <h1>ACCESS GRANTED: User_01 <span class="cursor"></span></h1>
        <p>> SYST_STATUS: STABLE</p>
        <p>> ENCRYPTION: ACTIVE</p>
        <p>> SYSTEM LOAD: 1.02%</p>
    </div>

    <div id="Minecraft" class="tab-content">
        <h1>NETWORK_NODE: Hilltop</h1>
        <p>> IP_ADDR: <b>hilltopsmp.minekeep.gg</b></p>
        <p>> STATUS: <span style="color: #4cd137;">UP_AND_RUNNING</span></p>
        <p>> UPTIME: 99.9%</p>
    </div>

    <div id="Apps" class="tab-content">
        <h1>AVAILABLE_MODULES</h1>
        <div class="app-card">
            <img src="https://github.com/mtndewaznotradley-ui/Raycast/raw/main/images/Discord%20bot.png" alt="Icon" class="avatar-img">
            <h2>DISCORD_RAIDER.exe</h2>
            <p>// INITIALIZE PROTOCOL: RAID_SERVER</p>
            <button id="downloadBtn" class="download-btn" onclick="startDownload()">Execute Download</button>
            <div id="progressContainer" class="progress-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <p id="statusText" class="status-text" style="display: none; margin-top: 10px;">DL_STATUS: 0%</p>
        </div>
    </div>

    <script>
        function showTab(evt, tabId) {
            const contents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < contents.length; i++) contents[i].classList.remove("active");
            
            const links = document.getElementsByClassName("tab-link");
            for (let i = 0; i < links.length; i++) links[i].classList.remove("active");

            document.getElementById(tabId).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        function startDownload() {
            const btn = document.getElementById('downloadBtn');
            const container = document.getElementById('progressContainer');
            const bar = document.getElementById('progressBar');
            const status = document.getElementById('statusText');
            
            btn.style.display = 'none';
            container.style.display = 'block';
            status.style.display = 'block';

            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    status.innerText = "TRANSFER_COMPLETE. INJECTING...";
                    setTimeout(() => {
                        window.location.href = "https://github.com/mtndewaznotradley-ui/Raycast/raw/main/Apps/Raider.zip"; 
                    }, 1000);
                } else {
                    width += Math.floor(Math.random() * 3) + 1;
                    if(width > 100) width = 100;
                    bar.style.width = width + '%';
                    status.innerText = "DOWNLOADING_DATA_PACKETS: " + width + "%";
                }
            }, 100);
        }
    </script>
</body>
</html>
