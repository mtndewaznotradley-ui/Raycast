<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raycast</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --accent: #555555;
            --border: #eeeeee;
            --owner-color: #ff4757;
            --success: #2ed573;
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: var(--text);
            margin: 0;
        }

        nav {
            display: none;
            width: 100%;
            justify-content: center;
            border-bottom: 1px solid var(--border);
            background: #fafafa;
        }

        .nav-btn {
            padding: 15px 25px;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            color: var(--accent);
            border-bottom: 2px solid transparent;
        }

        .nav-btn.active {
            color: #000;
            border-bottom: 2px solid #000;
        }

        .container {
            max-width: 500px;
            width: 90%;
            margin-top: 40px;
            text-align: center;
        }

        #login-screen {
            padding: 40px;
        }

        #main-content {
            display: none;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        .profile-card, .app-card {
            background: #fafafa;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .app-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
        }

        #display-pfp {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 2px solid var(--border);
        }

        #display-name {
            font-size: 1.5rem;
            font-weight: 600;
            display: block;
        }

        .owner-badge {
            display: none;
            color: var(--owner-color);
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        #download-ui {
            display: none;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-top: 20px;
        }

        .progress-container {
            width: 100%;
            background-color: #eee;
            border-radius: 10px;
            margin: 20px 0;
            height: 10px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background-color: var(--success);
            transition: width 0.1s linear;
        }

        .venmo-img {
            width: 150px;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        .venmo-img:hover {
            transform: scale(1.05);
        }

        .btn-update, .btn-open {
            padding: 10px 20px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-update { width: 100%; margin-top: 20px; }
        .btn-logout { background: transparent; color: var(--owner-color); border: 1px solid var(--owner-color); margin-top: 10px; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .g-center {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <header>
        <h1 class="logo">Raycast</h1>
    </header>

    <nav id="navbar">
        <button class="nav-btn active" id="btn-dash" onclick="switchTab('dashboard-tab', this)">Dashboard</button>
        <button class="nav-btn" onclick="switchTab('apps-tab', this)">Apps</button>
        <button class="nav-btn" onclick="switchTab('settings-tab', this)">Settings</button>
    </nav>

    <div class="container">
        <div id="login-screen">
            <h2>Please Log In</h2>
            <div id="g_id_onload"
                 data-client_id="609524851944-vpok2chtgp9v08nnr67qcqgfjk431tkv.apps.googleusercontent.com"
                 data-callback="handleCredentialResponse">
            </div>
            <div class="g-center">
                <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-size="large"></div>
            </div>
        </div>

        <div id="main-content">
            <div id="dashboard-tab" class="tab-content active">
                <div class="profile-card">
                    <img id="display-pfp" src="" alt="Profile">
                    <span id="display-name">User</span>
                    <div id="owner-badge" class="owner-badge">[OWNER]</div>
                </div>
            </div>

            <div id="apps-tab" class="tab-content">
                <div class="app-card">
                    <span>Windows Optimizer</span>
                    <button class="btn-open" onclick="showDownloadUI()">Open</button>
                </div>

                <div id="download-ui">
                    <h3>Download Windows Optimizer?</h3>
                    <button class="btn-update" id="dl-start-btn" onclick="startDownload()">Start Download</button>
                    
                    <div id="dl-progress-section" style="display:none;">
                        <div class="progress-container">
                            <div id="myBar" class="progress-bar"></div>
                        </div>
                        <p id="dl-status">Downloading... 0%</p>
                    </div>

                    <hr style="margin: 25px 0; border: 0; border-top: 1px solid #eee;">
                    <p>Tip us?</p>
                    <a href="https://venmo.com/raycast616" target="_blank">
                        <img src="https://github.com/mtndewaznotradley-ui/Raycast/raw/main/Images/Venmo_Logo.jpg" alt="Venmo" class="venmo-img">
                    </a>
                </div>
            </div>

            <div id="settings-tab" class="tab-content">
                <div class="edit-panel" style="text-align: left;">
                    <label style="font-size: 0.8rem; text-transform: uppercase; font-weight: 600; color: var(--accent); display: block; margin: 15px 0 8px 0;">Username</label>
                    <input type="text" id="input-username" style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px;">
                    
                    <label style="font-size: 0.8rem; text-transform: uppercase; font-weight: 600; color: var(--accent); display: block; margin: 15px 0 8px 0;">Upload Profile Picture</label>
                    <input type="file" id="input-file" accept="image/*" onchange="previewFile()" style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px;">
                    
                    <button class="btn-update" onclick="updateProfile()">Save Changes</button>
                    <button class="btn-update btn-logout" onclick="logout()">Logout Session</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let uploadedImageData = "";

        window.onload = function () {
            const savedUser = JSON.parse(localStorage.getItem('recast_user'));
            if (savedUser && savedUser.loggedIn) {
                applyUserData(savedUser);
                showMainUI();
            }
        };

        function handleCredentialResponse(response) {
            const payload = parseJwt(response.credential);
            const userData = {
                name: payload.name,
                picture: payload.picture,
                isOwner: payload.name === "Snap",
                loggedIn: true
            };
            localStorage.setItem('recast_user', JSON.stringify(userData));
            applyUserData(userData);
            showMainUI();
        }

        function applyUserData(data) {
            document.getElementById('display-name').innerText = data.name;
            document.getElementById('display-pfp').src = data.picture;
            document.getElementById('input-username').value = data.name;
            document.getElementById('owner-badge').style.display = (data.name === "Snap") ? "block" : "none";
        }

        function showMainUI() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('navbar').style.display = 'flex';
            document.getElementById('main-content').style.display = 'block';
        }

        function showDownloadUI() {
            document.getElementById('download-ui').style.display = 'block';
        }

        function startDownload() {
            const btn = document.getElementById('dl-start-btn');
            const progressSection = document.getElementById('dl-progress-section');
            const bar = document.getElementById('myBar');
            const status = document.getElementById('dl-status');
            
            btn.style.display = 'none';
            progressSection.style.display = 'block';
            
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    status.innerText = "Download Complete!";
                    window.open('https://github.com/mtndewaznotradley-ui/Raycast/raw/main/Apps/windows%20optimizer.zip', '_blank');
                } else {
                    width++;
                    bar.style.width = width + '%';
                    status.innerText = "Downloading... " + width + "%";
                }
            }, 100);
        }

        function switchTab(tabId, btn) {
            const contents = document.getElementsByClassName('tab-content');
            for (let content of contents) content.classList.remove('active');
            const btns = document.getElementsByClassName('nav-btn');
            for (let b of btns) b.classList.remove('active');
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        function previewFile() {
            const file = document.getElementById('input-file').files[0];
            const reader = new FileReader();
            reader.onloadend = () => { uploadedImageData = reader.result; }
            if (file) reader.readAsDataURL(file);
        }

        function updateProfile() {
            const currentData = JSON.parse(localStorage.getItem('recast_user'));
            const newName = document.getElementById('input-username').value;
            const newPic = uploadedImageData || currentData.picture;
            if (newName.trim() === "") return;
            currentData.name = newName;
            currentData.picture = newPic;
            localStorage.setItem('recast_user', JSON.stringify(currentData));
            applyUserData(currentData);
            switchTab('dashboard-tab', document.getElementById('btn-dash'));
        }

        function logout() {
            localStorage.removeItem('recast_user');
            location.reload();
        }

        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }
    </script>
</body>
</html>
